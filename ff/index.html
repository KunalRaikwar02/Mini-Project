<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CountUp Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <section class="hero">
    <h1>CountUp Stats</h1>
    <p>Scroll ya page load par numbers smoothly count honge</p>

    <div class="stats-box">

      <div class="card">
        <h2 class="count" data-from="0" data-to="1200" data-duration="2000" data-separator=",">0</h2>
        <p>Happy Customers</p>
      </div>

      <div class="card">
        <h2 class="count" data-from="0" data-to="95" data-duration="1800">0</h2>
        <p>Success Rate</p>
      </div>

      <div class="card">
        <h2 class="count" data-from="0" data-to="45000" data-duration="2500" data-separator=",">0</h2>
        <p>Total Sales</p>
      </div>

      <div class="card">
        <h2 class="count" data-from="100" data-to="0" data-duration="2000" data-direction="down">100</h2>
        <p>Countdown</p>
      </div>

    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
