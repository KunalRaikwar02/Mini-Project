<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circular Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="gallery-wrapper">
    <div class="gallery" id="gallery">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1200&auto=format&fit=crop">
        <h2>Mountains</h2>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e?q=80&w=1200&auto=format&fit=crop">
        <h2>Forest</h2>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1519608487953-e999c86e7455?q=80&w=1200&auto=format&fit=crop">
        <h2>City Lights</h2>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=1200&auto=format&fit=crop">
        <h2>Ocean</h2>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1526778548025-fa2f459cd5ce?q=80&w=1200&auto=format&fit=crop">
        <h2>Night</h2>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop">
        <h2>Desert</h2>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
