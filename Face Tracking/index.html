<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Robot Face Tracking</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <div class="logo">ORBIT</div>
    <div class="links">
      <a href="#">Home</a>
      <a href="#">Work</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <section class="hero">
    <div class="text">
      <p>Interactive Experience</p>
      <h1>ROBOT<br>VISION</h1>
    </div>

    <div class="model">
      <div class="head" id="head">
        <div class="antenna"></div>
        <div class="face-screen">
          <div class="eye left-eye"></div>
          <div class="eye right-eye"></div>
          <div class="nose"></div>
          <div class="mouth"></div>
        </div>
      </div>

      <div class="neck"></div>
      <div class="body">
        <div class="chest-light"></div>
      </div>
    </div>
  </section>

  <section class="section-two">
    <h2>Smart Motion Design</h2>
    <p>
      The robot head smoothly follows your cursor while the body stays fixed,
      giving a clean 3D interactive landing page feel.
    </p>
  </section>

  <script src="script.js"></script>
</body>
</html>
