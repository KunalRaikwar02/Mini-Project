<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowing Menu</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="menu-container">
    <nav class="flowing-menu">

      <div class="menu-item" data-text="Mojave" data-image="https://picsum.photos/600/400?random=1">
        <a href="#">Mojave</a>
        <div class="marquee"></div>
      </div>

      <div class="menu-item" data-text="Sonoma" data-image="https://picsum.photos/600/400?random=2">
        <a href="#">Sonoma</a>
        <div class="marquee"></div>
      </div>

      <div class="menu-item" data-text="Monterey" data-image="https://picsum.photos/600/400?random=3">
        <a href="#">Monterey</a>
        <div class="marquee"></div>
      </div>

      <div class="menu-item" data-text="Sequoia" data-image="https://picsum.photos/600/400?random=4">
        <a href="#">Sequoia</a>
        <div class="marquee"></div>
      </div>

    </nav>
  </div>

  <script src="script.js"></script>
</body>
</html>
