<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AuraBoard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="overlay"></div>

  <div class="card">
    <h1>AuraBoard</h1>

    <div class="clock" id="clock"></div>

    <div class="mood-buttons">
      <button data-mood="focus">🧠 Focus</button>
      <button data-mood="chill">🌊 Chill</button>
      <button data-mood="energy">⚡ Energy</button>
      <button data-mood="dark">🌙 Dark</button>
    </div>

    <p id="quote">Select your mood to activate your aura ✨</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
