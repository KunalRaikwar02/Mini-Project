<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hanging Ideas</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="glow"></div>

<header>
<h1>Hanging Ideas</h1>
<p>Hover on cards to explore creativity</p>
</header>

<div class="rope"></div>

<div class="cards">

<div class="hanger">
<div class="clip"></div>
<div class="string"></div>
<div class="card c1">
<div class="icon">💻</div>
<h3>Development</h3>
<p>Crafting modern web apps.</p>
</div>
</div>

<div class="hanger">
<div class="clip"></div>
<div class="string"></div>
<div class="card c2">
<div class="icon">🎨</div>
<h3>Design</h3>
<p>Building aesthetic UI.</p>
</div>
</div>

<div class="hanger">
<div class="clip"></div>
<div class="string"></div>
<div class="card c3">
<div class="icon">🚀</div>
<h3>Performance</h3>
<p>Speed & optimization.</p>
</div>
</div>

<div class="hanger">
<div class="clip"></div>
<div class="string"></div>
<div class="card c4">
<div class="icon">⚡</div>
<h3>Innovation</h3>
<p>Turning ideas into reality.</p>
</div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
