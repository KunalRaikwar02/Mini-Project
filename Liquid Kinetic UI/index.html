<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liquid Kinetic Noir</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <svg style="display: none;">
        <defs>
            <filter id="liquid-filter">
                <feTurbulence type="fractalNoise" baseFrequency="0.012" numOctaves="3" seed="5" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="0" id="liquid-map" />
            </filter>
            <filter id="grain">
                <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="3" stitchTiles="stitch" />
                <feColorMatrix type="saturate" values="0" />
            </filter>
        </defs>
    </svg>

    <div class="noise-overlay"></div>

    <div class="main">
        <div id="cursor-glow"></div>
        
        <div class="content">
            <span class="sub-heading">Fluid Motion</span>
            <h1 class="liquid-text">FRAGMENT</h1>
            <p class="description">Modern Aesthetic</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
