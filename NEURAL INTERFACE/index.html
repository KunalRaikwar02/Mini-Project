<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL // INTERFACE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="cursor"></div>
    <div class="noise"></div>

    <nav>
        <div class="logo">NEURAL.UX</div>
        <div class="nav-links">
            <span>INDEX</span>
            <span>ARCHIVE</span>
            <button class="cta">CONTACT</button>
        </div>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1 class="reveal">FUTURE</h1>
            <h1 class="reveal outline">FORMS</h1>
        </div>
        <div class="scroll-indicator">SCROLL TO EXPLORE</div>
    </section>

    <section class="gallery">
        <div class="grid">
            <div class="item" data-color="#ff3e3e">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=1000" alt="">
                    <div class="overlay"></div>
                </div>
                <div class="item-info">
                    <span>01 / DESIGN</span>
                    <h3>KINETIC VOID</h3>
                </div>
            </div>

            <div class="item" data-color="#3effa5">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?q=80&w=1000" alt="">
                    <div class="overlay"></div>
                </div>
                <div class="item-info">
                    <span>02 / MOTION</span>
                    <h3>LIQUID LOGIC</h3>
                </div>
            </div>

            <div class="item" data-color="#3e84ff">
                <div class="img-wrapper">
                    <img src="https://images.unsplash.com/photo-1633167606207-d840b5070fc2?q=80&w=1000" alt="">
                    <div class="overlay"></div>
                </div>
                <div class="item-info">
                    <span>03 / SYSTEM</span>
                    <h3>DARK CORE</h3>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="footer-grid">
            <div class="f-card f-main">
                <h2>READY TO <br> INNOVATE?</h2>
                <p>Build the next generation of web interfaces with Neural.UX</p>
            </div>
            <div class="f-card f-sub">
                <span>SOCIAL</span>
                <div class="links">
                    <a>INSTAGRAM</a><a>LINKEDIN</a><a>DRIBBBLE</a>
                </div>
            </div>
            <div class="f-card f-sub">
                <span>OFFICE</span>
                <p>221B BAKER ST. <br> LONDON, UK</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
