<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liquid Mirror Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-text">MIRROR</div>

  <main>
    <h1>Liquid Mirror Gallery</h1>
    <p>Move your mouse and click any frame</p>

    <section class="gallery">
      <div class="card" data-title="Moon Silence">
        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80">
      </div>

      <div class="card" data-title="Dark Forest">
        <img src="https://images.unsplash.com/photo-1448375240586-882707db888b?auto=format&fit=crop&w=900&q=80">
      </div>

      <div class="card" data-title="White Desert">
        <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=900&q=80">
      </div>
    </section>
  </main>

  <div class="preview">
    <span class="close">×</span>
    <img src="" alt="">
    <h2></h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
